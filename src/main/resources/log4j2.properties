# ==========================================
# Global Properties
# ==========================================

property.basePath=test-output/logs
property.executionId=${date:yyyy-MM-dd_HH-mm-ss}

# ==========================================
# File Appender
# ==========================================

appender.file.type=File
appender.file.name=fileAppender

appender.file.fileName=${basePath}/${executionId}/framework.log

appender.file.layout.type=PatternLayout
appender.file.layout.pattern=[%p] [%d{yyyy-MM-dd HH:mm:ss.SSS}] [%t] [%c{1}] - %msg%n

# ==========================================
# Console Appender
# ==========================================

appender.stdout.type=Console
appender.stdout.name=consoleAppender

appender.stdout.layout.type=PatternLayout
appender.stdout.layout.disableAnsi=false

appender.stdout.layout.pattern=%highlight{[%p]} [%d{HH:mm:ss.SSS}] [%t] [%c{1}] - %msg%n

# ==========================================
# Root Logger
# ==========================================

rootLogger.level=debug

rootLogger.appenderRefs=file,stdout

rootLogger.appenderRef.file.ref=fileAppender
rootLogger.appenderRef.stdout.ref=consoleAppender