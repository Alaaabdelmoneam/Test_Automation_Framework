name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC
  workflow_dispatch: # Enable manual triggers

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Install Allure CLI
      shell: pwsh
      run: |
        $version = "2.29.0"
        $url = "https://github.com/allure-framework/allure2/releases/download/$version/allure-$version.zip"
        Invoke-WebRequest -Uri $url -OutFile allure.zip
        Expand-Archive -Path allure.zip -DestinationPath "$env:RUNNER_TOOL_CACHE\allure" -Force
        $allureBin = "$env:RUNNER_TOOL_CACHE\allure\allure-$version\bin"
        echo "$allureBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Host "Allure CLI installed at: $allureBin"

    - name: Run tests with Maven
      run: mvn clean test -Dtest=E2ETests

    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: test-output/allure-reports/
        retention-days: 7

    - name: Upload Raw Test Outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-outputs
        path: test-output/
        retention-days: 7
