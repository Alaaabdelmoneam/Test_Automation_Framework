name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC
  workflow_dispatch: # Enable manual triggers

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run tests with Maven
      run: mvn clean test -Dtest=E2ETests

    - name: Generate Allure Report
      if: always()
      run: mvn allure:report -Dallure.results.directory=test-output/allure-results

    - name: Upload Allure HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
        retention-days: 7

    - name: Upload Raw Test Outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-outputs
        path: test-output/
        retention-days: 7
